{% extends "base.html" %}

{% block title %}New support request – Aquento{% endblock %}

{% block content %}
<div class="content-container">
    <h1 class="mb-4">New support request</h1>

    <form method="post">
        {% csrf_token %}
        <div class="mb-3">
            <label class="form-label">Subject</label>
            <input type="text" name="subject" class="form-control" required maxlength="255">
        </div>
        <div class="mb-3">
            <label class="form-label">Message</label>
            <textarea name="text" rows="5" class="form-control" required></textarea>
        </div>
        <button type="submit" class="btn btn-aquento">Send</button>
    </form>
</div>
{% endblock %}
